---
driver:
  name: "docker"
platforms:
  - name: "instance"
    image: "ghcr.io/goathy/docker-${MOLECULE_DISTRO:-almalinux10}-ansible:latest"
    command: ""
    volumes:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    cgroupns_mode: "host"
    privileged: true
    pre_build_image: true
provisioner:
  name: "ansible"
  playbooks:
    converge: "${MOLECULE_PLAYBOOK:-converge.yml}"
